amcl:
  ros__parameters:
    use_sim_time: True
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "base_footprint"
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_beams: 60
    laser_model_type: "likelihood_field"
    max_beams: 60
    max_particles: 2000
    min_particles: 500
    odom_frame_id: "odom"
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 1.0
    update_min_a: 0.2
    update_min_d: 0.25
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05

bt_navigator:
  ros__parameters:
    use_sim_time: True
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    # 'default_nav_to_pose_bt_xml' 같은 경로는 기본값 사용

controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["goal_checker"] 
    controller_plugins: ["FollowPath"]

    # 진행 확인 (멈춰있으면 실패 처리)
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    
    # 목표 도착 확인
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
      stateful: True
    
    # DWB 컨트롤러 설정 (수정됨: 제자리 회전 & 좁은 길 최적화)
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: True
      
      # [속도 설정] 제자리 회전을 위해 min 속도는 0 유지
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.22      # 좁은 길 안전을 위해 약간 감속 (0.26 -> 0.22)
      max_vel_y: 0.0
      max_vel_theta: 1.5   # [수정] 0.5 -> 1.5 (답답하지 않게 회전 속도 올림)
      
      min_speed_xy: 0.0
      max_speed_xy: 0.22
      min_speed_theta: 0.0
      
      # [가속도 설정] 여기가 핵심! (Pivot Turn을 만드는 부분)
      acc_lim_x: 2.5
      acc_lim_y: 0.0
      acc_lim_theta: 3.2   # [수정] 0.5 -> 3.2 (회전 가속도를 높여야 제자리에서 바로 돔)
      dec_lim_x: 2.5
      dec_lim_y: 0.0
      dec_lim_theta: 3.2   # [수정] 멈출 때도 밀리지 않고 딱 멈춤
      
      # [경로 샘플링]
      vx_samples: 20
      vy_samples: 5
      vtheta_samples: 40   # [수정] 20 -> 40 (회전 경로를 더 다양하게 탐색)
      
      sim_time: 1.5        # [수정] 1.7 -> 1.5 (좁은 곳에서는 너무 멀리 예측하면 벽 때문에 못 움직임)
      linear_granularity: 0.05
      angular_granularity: 0.025
      
      transform_tolerance: 0.2 # 1.5 -> 0.2 (TF 딜레이 허용치를 줄여서 반응성 향상)
      xy_goal_tolerance: 0.10  # [수정] 목표 지점에 더 정확히 주차
      yaw_goal_tolerance: 0.1
      
      trans_stopped_velocity: 0.1
      short_circuit_trajectory_evaluation: True
      stateful: True
      
      # [평가 기준(Critics) 정의]
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      
      # 장애물 회피 설정
      BaseObstacle.scale: 0.01 # 좁은 길을 가야 하므로 장애물 공포심을 낮게 유지
      
      # 경로 추종성 강화 (타원 주행 방지)
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.1
      
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.1
      
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      
      # 목표 방향 회전 설정
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0
      
      # [에러 원인 해결] 평가 기준(Critics) 정의
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.01 # 장애물에 대한 공포심 줄임
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: True
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      robot_radius: 0.22  # 로봇 반지름 (Waffle Pi)
      plugins: ["voxel_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 40.0  # [튜닝] 좁은 길 통과를 위해 값을 높임 (장애물 영향 범위 축소)
        inflation_radius: 0.50     # [튜닝] 로봇 반지름(0.22)보다 약간 크게 설정하여 좁은 틈 허용
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          obstacle_max_range: 2.5
      transform_tolerance: 1.5

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: True
      robot_radius: 0.22
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          obstacle_max_range: 2.5
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 70
        inflation_radius: 0.10  # [튜닝] 글로벌 경로도 좁은 곳을 통과하도록 설정
    transform_tolerance: 1.5

lifecycle_manager:
  ros__parameters:
    use_sim_time: True
    autostart: True
    node_names: ['map_server', 'amcl', 'controller_server', 'bt_navigator', 'waypoint_follower']
    bond_timeout: 15.0